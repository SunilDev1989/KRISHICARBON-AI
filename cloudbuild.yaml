steps:
  # ── Step 1: Build Docker image ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--tag'
      - 'gcr.io/$PROJECT_ID/krishicarbon-ai:$COMMIT_SHA'
      - '--tag'
      - 'gcr.io/$PROJECT_ID/krishicarbon-ai:latest'
      # NEXT_PUBLIC_* must be baked in at build time (not secrets)
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_SENDER_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}'
      - '.'

  # ── Step 2: Push image to Google Container Registry ─────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/krishicarbon-ai:$COMMIT_SHA'

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'krishicarbon-ai'
      - '--image=gcr.io/$PROJECT_ID/krishicarbon-ai:$COMMIT_SHA'
      - '--region=asia-south1'           # Mumbai — closest to Indian farmers
      - '--platform=managed'
      - '--allow-unauthenticated'        # Public web app
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'              # Scale to zero when idle (cost-efficient)
      - '--max-instances=10'
      # Server-side secrets from Secret Manager (NEVER hardcoded)
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,OPENWEATHERMAP_API_KEY=OPENWEATHERMAP_API_KEY:latest,GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest'

# Cloud Build substitution variables (set in Cloud Build trigger UI)
substitutions:
  _FIREBASE_API_KEY: 'placeholder'
  _FIREBASE_AUTH_DOMAIN: 'placeholder'
  _FIREBASE_PROJECT_ID: 'placeholder'
  _FIREBASE_STORAGE_BUCKET: 'placeholder'
  _FIREBASE_SENDER_ID: 'placeholder'
  _FIREBASE_APP_ID: 'placeholder'

# Images to push to GCR
images:
  - 'gcr.io/$PROJECT_ID/krishicarbon-ai:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/krishicarbon-ai:latest'

options:
  logging: CLOUD_LOGGING_ONLY
